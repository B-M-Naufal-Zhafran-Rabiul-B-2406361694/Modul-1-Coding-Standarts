<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order History</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
</head>
<body>
<div class="container mt-4">
    <h3>Order History</h3>

    <form th:action="@{/order/history}" method="post" class="mb-4">
        <div class="form-group">
            <label for="authorSearchInput">Author Name</label>
            <input id="authorSearchInput" name="author" type="text" class="form-control col-md-6"
                   th:value="${author}">
        </div>
        <button id="searchOrderButton" type="submit" class="btn btn-primary">Search</button>
        <a th:href="@{/order/create}" class="btn btn-outline-secondary ml-2">Create Order</a>
    </form>

    <div th:if="${orders != null}">
        <h5 class="mb-3">Result</h5>
        <table class="table table-striped">
            <thead>
            <tr>
                <th>Order ID</th>
                <th>Author</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${orders.isEmpty()}">
                <td colspan="4">No orders found.</td>
            </tr>
            <tr th:each="order : ${orders}">
                <td th:text="${order.id}"></td>
                <td th:text="${order.author}"></td>
                <td th:text="${order.status}"></td>
                <td>
                    <a th:href="@{/order/pay/{orderId}(orderId=${order.id})}" class="btn btn-sm btn-success">
                        Pay
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
