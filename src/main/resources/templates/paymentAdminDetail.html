<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Admin Detail</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
</head>
<body>
<div class="container mt-4">
    <h3>Payment Admin Detail</h3>

    <div th:if="${payment == null}" class="alert alert-warning">
        Payment not found.
    </div>

    <div th:if="${payment != null}">
        <table class="table table-bordered w-75">
            <tr>
                <th>Payment ID</th>
                <td id="paymentIdValue" th:text="${payment.id}"></td>
            </tr>
            <tr>
                <th>Method</th>
                <td id="paymentMethodValue" th:text="${payment.method}"></td>
            </tr>
            <tr>
                <th>Status</th>
                <td id="paymentStatusValue" th:text="${payment.status}"></td>
            </tr>
            <tr>
                <th>Order ID</th>
                <td th:text="${payment.order.id}"></td>
            </tr>
        </table>

        <form th:action="@{/payment/admin/set-status/{paymentId}(paymentId=${payment.id})}" method="post">
            <button id="successButton" type="submit" name="status" value="SUCCESS" class="btn btn-success">
                Set SUCCESS
            </button>
            <button id="rejectButton" type="submit" name="status" value="REJECTED" class="btn btn-danger ml-2">
                Set REJECTED
            </button>
        </form>
    </div>

    <a th:href="@{/payment/admin/list}" class="btn btn-outline-secondary mt-3">Back to Payment Admin</a>
</div>
</body>
</html>
