<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Detail</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
</head>
<body>
<div class="container mt-4">
    <h3>Payment Detail</h3>

    <div th:if="${payment == null}" class="alert alert-warning">
        Payment not found.
    </div>

    <div th:if="${payment != null}">
        <table class="table table-bordered w-75">
            <tr>
                <th>Payment ID</th>
                <td id="paymentIdValue" th:text="${payment.id}"></td>
            </tr>
            <tr>
                <th>Method</th>
                <td id="paymentMethodValue" th:text="${payment.method}"></td>
            </tr>
            <tr>
                <th>Status</th>
                <td id="paymentStatusValue" th:text="${payment.status}"></td>
            </tr>
            <tr>
                <th>Order ID</th>
                <td id="orderIdValue" th:text="${payment.order.id}"></td>
            </tr>
        </table>
    </div>

    <a th:href="@{/payment/detail}" class="btn btn-outline-secondary">Back</a>
</div>
</body>
</html>
